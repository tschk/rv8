name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dri
      - name: Build (default)
        run: cargo build
      - name: Test (default)
        run: cargo test
      - name: Build (servo-render)
        run: cargo build --features servo-render
      - name: Test (servo-render)
        run: cargo test --features servo-render
      - name: Release build (default)
        run: cargo build --release
      - name: Release build (servo-render)
        run: cargo build --release --features servo-render
